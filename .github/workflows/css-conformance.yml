name: CSS Conformance

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize]

jobs:
  validate-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all HTML files for correct CSS reference
        run: |
          echo "Checking HTML files for correct styles.css reference..."
          ERROR_COUNT=0
          
          for file in *.html; do
            if [ -f "$file" ]; then
              if grep -q '<link.*stylesheet' "$file"; then
                if ! grep -q 'href="styles.css"' "$file"; then
                  echo "ERROR: $file does not reference styles.css correctly"
                  echo "Expected: <link rel=\"stylesheet\" href=\"styles.css\">"
                  echo "Found:"
                  grep -n 'stylesheet' "$file" || true
                  echo "---"
                  ERROR_COUNT=$((ERROR_COUNT + 1))
                fi
              fi
            fi
          done
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "$ERROR_COUNT file(s) failed CSS conformance check"
            exit 1
          fi
          
          echo "All HTML files reference styles.css correctly."
