<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breath - Breathing Tracker</title>
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
    <!-- Home View -->
    <div id="home-view" class="view">
        <header>
            <a href="../../index.html" class="logo-link">
                <div class="static-logo">
                    <div class="observer obs-1"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#F5C542"/></svg></div>
                    <div class="observer obs-2"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#F5A3C7"/></svg></div>
                    <div class="observer obs-3"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#A3E048"/></svg></div>
                    <div class="observer obs-4"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#7DD3E8"/></svg></div>
                    <div class="center-circle"></div>
                    <svg class="center-star" viewBox="0 0 160 160"><path d="M80,40 A40,40 0 0,0 120,80 A40,40 0 0,0 80,120 A40,40 0 0,0 40,80 A40,40 0 0,0 80,40 Z" fill="white"/></svg>
                </div>
            </a>
            <h1>Breath</h1>
            <p class="subtitle">Track your breathing journey</p>
        </header>

        <main class="home-content">
            <div class="chart-container">
                <canvas id="breathing-chart"></canvas>
                <div id="empty-state" class="empty-state">
                    <p>No sessions yet</p>
                    <p class="hint">Start breathing to see your trends</p>
                </div>
            </div>

            <button id="start-btn" class="primary-btn">
                Start Breathing
            </button>
        </main>
    </div>

    <!-- Breathing View -->
    <div id="breathing-view" class="view hidden">
        <header>
            <button id="back-btn" class="back-btn">&larr; Back</button>
            <span class="session-label">Session in progress</span>
        </header>

        <main class="breathing-content">
            <div id="breathing-circle" class="breathing-circle">
                <span id="timer-display" class="timer">0.0</span>
                <span id="phase-label" class="phase">Tap to start</span>
            </div>

            <div class="cycle-info">
                <span id="cycle-count">Cycle: 0</span>
            </div>

            <div class="current-cycle">
                <div class="stat">
                    <span class="stat-label">Inhale</span>
                    <span id="current-inhale" class="stat-value">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Hold</span>
                    <span id="current-hold" class="stat-value">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Exhale</span>
                    <span id="current-exhale" class="stat-value">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Retention</span>
                    <span id="current-retention" class="stat-value">-</span>
                </div>
            </div>

            <button id="end-session-btn" class="secondary-btn">
                End Session
            </button>
        </main>
    </div>

    <script src="../../theme.js"></script>
    <script src="chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
