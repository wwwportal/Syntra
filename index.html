<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Animation -->
    <div id="loading-screen">
        <div class="loading-container">
            <!-- The 4 observer eyes - pac-man style with pie-slice notch -->
            <!-- Notch: 80° wedge, points from center (50,50) to circle edge (r=48) -->
            <!-- At ±40° from left: upper (5.3, 19.1), lower (5.3, 80.9) -->
            <div class="observer" id="obs-1">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="currentColor"/>
                </svg>
            </div>
            <div class="observer" id="obs-2">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="currentColor"/>
                </svg>
            </div>
            <div class="observer" id="obs-3">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="currentColor"/>
                </svg>
            </div>
            <div class="observer" id="obs-4">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="currentColor"/>
                </svg>
            </div>
            <!-- Black center circle behind the star -->
            <div class="center-circle" id="center-circle"></div>
            <!-- The star - curved 4-pointed shape (negative space of 4 circles) -->
            <svg class="center-star" id="star" viewBox="0 0 160 160">
                <!-- Curved star: arcs curve INWARD (sweep-flag=0) to form the concave star shape -->
                <path d="M80,40 A40,40 0 0,0 120,80 A40,40 0 0,0 80,120 A40,40 0 0,0 40,80 A40,40 0 0,0 80,40 Z" fill="currentColor"/>
            </svg>
        </div>
    </div>

    <div id="main-content">
    <header>
        <h1>Portal</h1>
        <p class="subtitle">A collection of tools I've built</p>
    </header>

    <main class="app-grid">
        <!-- Breath App Card -->
        <a href="apps/breath/index.html" class="app-card">
            <div class="app-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 8v4M12 16v.01"/>
                </svg>
            </div>
            <div class="app-info">
                <h2>Breath</h2>
                <p>Track your breathing patterns with inhale, hold, exhale, and retention phases. Visualize your progress over time.</p>
            </div>
            <span class="app-arrow">&rarr;</span>
        </a>

        <!-- Placeholder for future apps -->
        <div class="app-card placeholder">
            <div class="app-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </div>
            <div class="app-info">
                <h2>More coming soon</h2>
                <p>New apps will appear here as they're created.</p>
            </div>
        </div>
    </main>

    <footer>
        <p>Built with care</p>
    </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
    <script src="loading.js"></script>
</body>
</html>
