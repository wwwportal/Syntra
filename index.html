<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Animation -->
    <div id="loading-screen">
        <div class="loading-container">
            <!-- The 4 observer eyes - pac-man style with pie-slice notch -->
            <!-- Notch: 80° wedge, points from center (50,50) to circle edge (r=48) -->
            <!-- At ±40° from left: upper (5.3, 19.1), lower (5.3, 80.9) -->
            <div class="observer" id="obs-1">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="currentColor"/>
                </svg>
            </div>
            <div class="observer" id="obs-2">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="currentColor"/>
                </svg>
            </div>
            <div class="observer" id="obs-3">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="currentColor"/>
                </svg>
            </div>
            <div class="observer" id="obs-4">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="currentColor"/>
                </svg>
            </div>
            <!-- Black center circle behind the star -->
            <div class="center-circle" id="center-circle"></div>
            <!-- The star - curved 4-pointed shape (negative space of 4 circles) -->
            <svg class="center-star" id="star" viewBox="0 0 160 160">
                <!-- Curved star: arcs curve INWARD (sweep-flag=0) to form the concave star shape -->
                <path d="M80,40 A40,40 0 0,0 120,80 A40,40 0 0,0 80,120 A40,40 0 0,0 40,80 A40,40 0 0,0 80,40 Z" fill="currentColor"/>
            </svg>
        </div>
    </div>

    <div id="main-content">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
    <header>
        <h1>Portal</h1>
        <p class="subtitle">A collection of tools I've built</p>
    </header>

    <main class="app-grid">
        <!-- Breath App Card -->
        <div class="tarot-card">
            <a href="apps/breath/index.html" class="card-rotator">
                <div class="card-inner">
                    <div class="card-image">
                        <img src="apps/breath/breath.png" alt="Breath App" class="card-art">
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">Breath</h2>
                        <p class="card-description">Track your breathing patterns</p>
                    </div>
                    <div class="card-iridescent"></div>
                    <div class="card-shine"></div>
                    <div class="card-glare"></div>
                </div>
            </a>
        </div>

        <!-- The Hill - Coming Soon -->
        <div class="tarot-card coming-soon">
            <div class="card-rotator">
                <div class="card-inner">
                    <div class="card-image">
                        <img src="apps/the-hill/Hill.png" alt="The Hill" class="card-art">
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">The Hill</h2>
                        <p class="card-description">Interactive visual novel · Coming Soon</p>
                    </div>
                    <div class="card-iridescent"></div>
                    <div class="card-shine"></div>
                    <div class="card-glare"></div>
                </div>
            </div>
        </div>

        <!-- NumComp App Card -->
        <div class="tarot-card">
            <a href="apps/numcomp/index.html" class="card-rotator">
                <div class="card-inner">
                    <div class="card-image">
                        <img src="apps/numcomp/NumNode.jpg" alt="NumComp" class="card-art">
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">NumComp</h2>
                        <p class="card-description">Visual numerical computing</p>
                    </div>
                    <div class="card-iridescent"></div>
                    <div class="card-shine"></div>
                    <div class="card-glare"></div>
                </div>
            </a>
        </div>
    </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
    <script src="theme.js"></script>
    <script src="loading.js"></script>
    <script src="cards.js"></script>
</body>
</html>
